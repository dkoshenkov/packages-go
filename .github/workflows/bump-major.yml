name: Bump Major Version

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bump-version-major
  cancel-in-progress: false

jobs:
  bump-major:
    name: Create next major version tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create next major version tag
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force origin

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)"
          if [[ -z "${latest_tag}" ]]; then
            latest_tag="v0.0.0"
          fi

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "${version}"

          next_tag="v$((major + 1)).0.0"

          if git rev-parse -q --verify "refs/tags/${next_tag}" >/dev/null 2>&1; then
            echo "Tag ${next_tag} already exists"
            exit 1
          fi

          echo "Latest tag: ${latest_tag}"
          echo "Next tag: ${next_tag}"

          git tag -a "${next_tag}" -m "Release ${next_tag}"
          git push origin "${next_tag}"