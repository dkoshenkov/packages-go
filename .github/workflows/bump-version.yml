name: Bump Version

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: write

concurrency:
  group: bump-version-main
  cancel-in-progress: false

jobs:
  bump-version:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Decide bump type
        id: bump
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          shopt -s nocasematch

          bump="minor"

          if [[ "${HEAD_REF}" == fixture/* ]]; then
            bump="patch"
          elif [[ "${PR_TITLE}" =~ (^|[^[:alpha:]])fix(ed)?([^[:alpha:]]|$) ]]; then
            bump="patch"
          fi

          echo "bump=${bump}" >> "$GITHUB_OUTPUT"
          echo "PR title: ${PR_TITLE}"
          echo "Head ref: ${HEAD_REF}"
          echo "Selected bump: ${bump}"

      - name: Create next version tag
        shell: bash
        env:
          BUMP_TYPE: ${{ steps.bump.outputs.bump }}
        run: |
          set -euo pipefail

          git fetch --tags --force origin

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)"
          if [[ -z "${latest_tag}" ]]; then
            latest_tag="v0.0.0"
          fi

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "${version}"

          case "${BUMP_TYPE}" in
            patch)
              patch=$((patch + 1))
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            *)
              echo "Unknown bump type: ${BUMP_TYPE}"
              exit 1
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"

          if git rev-parse -q --verify "refs/tags/${next_tag}" >/dev/null 2>&1; then
            echo "Tag ${next_tag} already exists"
            exit 1
          fi

          echo "Latest tag: ${latest_tag}"
          echo "Next tag: ${next_tag}"

          git tag -a "${next_tag}" -m "Release ${next_tag}"
          git push origin "${next_tag}"