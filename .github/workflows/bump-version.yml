name: Bump Version

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: bump-version-main
  cancel-in-progress: false

jobs:
  bump-version:
    name: Create next patch tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create next version tag
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          current_tag="$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
          if [[ -n "${current_tag}" ]]; then
            echo "Current commit already has version tag ${current_tag}"
            exit 0
          fi

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)"
          if [[ -z "${latest_tag}" ]]; then
            latest_tag="v0.0.0"
          fi

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "${version}"
          next_tag="v${major}.${minor}.$((patch + 1))"

          echo "Latest tag: ${latest_tag}"
          echo "Next tag: ${next_tag}"

          git tag -a "${next_tag}" -m "Release ${next_tag}"
          git push origin "${next_tag}"
